<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="playButton">Start</button>
    <form action="">
        <input type="number" id="inputTempo">
        <button type="button" id="submitTempo">
            Submit Tempo
        </button>
    </form>
    <p>
        Beats Accented
        <form action="">
            <input type="radio" id="noAccent" name="accentBeat" value="1">
            <label for="noAccent">1</label>

            <input type="radio" id="every2" name="accentBeat" value="2">
            <label for="every2">2</label>

            <input type="radio" id="every3" name="accentBeat" value="3">
            <label for="every3">3</label>

            <input type="radio" id="every4" name="accentBeat" value="4">
            <label for="every4">4</label>
        </form>
    </p>


    <script src="script.js"></script>
</body>
</html>
