<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <div id="head">
            <button id="playButton">Start</button>
            <input type="range" id="tempoInput" min="1" max="350">
            <span id="tempoOutput"></span><span> BPM</span>
        </div>
        
        <div id="bodyMetronome">
            <p>
                Measure
            <select name="Measures" id="measure">
                    <option value="1">1/4</option>
                    <option value="2">2/4</option>
                    <option value="3">3/4</option>
                    <option value="4" selected>4/4</option>
                    <option value="5">5/4</option>
                    <option value="6">6/4</option>
                    <option value="7">7/4</option>
                    <option value="8">8/4</option>
                    <option value="9">9/4</option>
                    <option value="10">10/4</option>
                    <option value="11">11/4</option>
                    <option value="12">12/4</option>
                    <option value="13">13/4</option>
                    <option value="14">14/4</option>
                    <option value="15">15/4</option>
                    <option value="16">16/4</option>
            </select>
            </p>
            <p>
                Accent beat number:
                <form id="accents">
                    <input type="checkbox" value="1" name="accentedBeats" checked>
                    <label>1</label>

                    <input type="checkbox" value="2" name="accentedBeats">
                    <label>2</label>

                    <input type="checkbox" value="3" name="accentedBeats">
                    <label>3</label>

                    <input type="checkbox" value="4" name="accentedBeats">
                    <label>4</label>
                </form>
            </p>

            <p>
                Skip beat number:
                <form id="skips">
                    <input type="checkbox" value="1" name="skippedBeats">
                    <label>1</label>

                    <input type="checkbox" value="2" name="skippedBeats">
                    <label>2</label>

                    <input type="checkbox" value="3" name="skippedBeats">
                    <label>3</label>

                    <input type="checkbox" value="4" name="skippedBeats">
                    <label>4</label>
                </form>
            </p>

            <p id="tempoProgramingContainer">
                <input type="checkbox" id="tempoPrograming">
                <label for="tempoPrograming">Tempo Programing</label>
            </p>
            <div id="beatContainer"></div>
            <div id="beatInputContainer">
            </div>
            <datalist id="beatInput">
                <option value="0">Skip</option>
                <option value="1">Normal</option>
                <option value="2">Accented</option>
                <option value="3">High-Pitch</option>
            </datalist>
        </div>
    </div>
        
    <script src="script.js"></script>
</body>
</html>
